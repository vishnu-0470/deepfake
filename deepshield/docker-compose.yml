# ─────────────────────────────────────────────────────────
#  DeepShield KYC  –  docker-compose.yml
#  Services: app, redis, nginx (reverse proxy)
# ─────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── Main Application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: deepshield_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme_in_production}
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=${DEBUG:-false}
      - HW_AUTH_ENABLED=${HW_AUTH_ENABLED:-true}
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - deepshield_net
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    # GPU support (uncomment if NVIDIA GPU available)
    # runtime: nvidia
    # environment:
    #   - NVIDIA_VISIBLE_DEVICES=all

  # ── Redis (session store + task queue) ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: deepshield_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deepshield_net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: deepshield_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - deepshield_net

volumes:
  redis_data:

networks:
  deepshield_net:
    driver: bridge
